openapi: 3.1.0
info:
  title: PolicyGPT Coordinator API
  version: 0.1.0
  description: Appendix C skeleton from POLICYGPT_ARCHITECTURE_PLAN.md. Frozen API surface; implementation details fill in during M0/M1.
servers:
  - url: https://coordinator.example.com
    description: Placeholder Cloud Run coordinator URL
tags:
  - name: plugin
  - name: guest
  - name: rater
  - name: staff
  - name: admin
paths:
  # Guest session & PIN flow (plan §9.1, §9.3, §6.5, §6.8)
  /guest/session:
    post:
      tags: [guest]
      summary: Issue a guest session token on first contact
      description: "Plugin calls this before any quote or Q&A for an unauthenticated visitor. Returns a session_id stored client-side (httpOnly cookie preferred). Plan §9.1."
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Guest session token issued
          content:
            application/json:
              schema:
                type: object
                required: [session_id]
                properties:
                  session_id: { type: string }
  /quote/{id}/status:
    get:
      tags: [plugin]
      summary: Poll quote progress for the live-progress indicator
      description: "Plugin polls every ~1–2 s after intake completes to drive the progress indicator. Returns current job status, stage label, and progress %. Plan §6.8."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Current quote status and progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [queued, claimed, running, awaiting_carrier_answer, completed, failed] }
                  stage: { type: string, description: "Human-readable stage label e.g. 'Checking Carrier A…'" }
                  progress: { type: integer, minimum: 0, maximum: 100 }
                  pending_question:
                    $ref: "#/components/schemas/PendingCarrierQuestion"
                    description: "Present when a carrier asked an unexpected question; the plugin renders this card on the processing screen and posts the answer to /quote/{id}/carrier-answer."
        "404":
          description: Session/job not found
  /quote/{id}/carrier-answer:
    post:
      tags: [plugin]
      summary: Submit the user's answer to a live carrier question (adaptive flow)
      description: "When GET /quote/{id}/status returns a pending_question, the plugin renders the card on the processing screen, the user answers, and the plugin posts it here. The Coordinator queues it and hands it to the rater on its next heartbeat (pending_answer). The Q+A is persisted to the profession's question set so it isn't asked again. Adaptive Rater Intelligence."
      security:
        - pluginHmac: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question_id, answer]
              properties:
                question_id: { type: string }
                answer: {}
      responses:
        "200":
          description: Answer accepted and queued for the rater
  /quote/{id}/pin/verify:
    post:
      tags: [guest]
      summary: Verify a guest PIN to retrieve a completed quote
      description: "Guest returns via magic link, enters 6-digit PIN. Coordinator verifies against salted hash, throttles attempts, locks after N failures. Plan §9.3."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pin, email]
              properties:
                pin: { type: string, pattern: "^[0-9]{6}$" }
                email: { type: string, format: email }
      responses:
        "200":
          description: PIN verified; returns a short-lived retrieval token
          content:
            application/json:
              schema:
                type: object
                required: [retrieval_token]
                properties:
                  retrieval_token: { type: string }
        "401":
          description: Invalid PIN
        "429":
          description: Too many failed attempts; account locked
  /quote/{id}/result:
    get:
      tags: [guest]
      summary: Retrieve a completed quote result (requires auth or valid retrieval_token)
      description: "After PIN verify (guest) or session auth (logged-in), returns the quote result and signed PDF links minted on demand. Plan §6.5."
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: retrieval_token
          in: query
          required: false
          schema: { type: string }
          description: "Short-lived token from /quote/{id}/pin/verify (guest path). Omit when session is authenticated."
      responses:
        "200":
          description: Quote result with carrier results and signed PDF links
        "401":
          description: Not authenticated or retrieval_token invalid/expired
        "404":
          description: Quote not found
  /user/quotes:
    get:
      tags: [plugin]
      summary: My Quotes — list a logged-in user's quotes with live status
      description: "Returns the authenticated user's quote history with current status and on-demand signed PDF links. Plan §6.5, §16 M6."
      security:
        - pluginHmac: []
      responses:
        "200":
          description: List of the user's quotes
          content:
            application/json:
              schema:
                type: object
                properties:
                  quotes:
                    type: array
                    items:
                      type: object
                      properties:
                        quote_session_id: { type: string }
                        status: { type: string }
                        profession: { type: string }
                        line_of_business: { type: string }
                        created_at: { type: string }
                        pdf_url: { type: string, description: "Short-lived signed URL, minted on demand." }
  /health:
    get:
      tags: [plugin]
      summary: Health check
      responses:
        "200":
          description: Coordinator is healthy
  /chat:
    post:
      tags: [plugin]
      summary: Free Q&A or quote-mode chat request
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Chat response
  /quote/start:
    post:
      tags: [plugin]
      summary: Start a quote session
      security:
        - pluginHmac: []
      responses:
        "200":
          description: First quote question/card
  /quote/answer:
    post:
      tags: [plugin]
      summary: Submit a scalar answer
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Next question/card or completion state
  /quote/answer-group:
    post:
      tags: [plugin]
      summary: Submit grouped card answers
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Next question/card or completion state
  /quote/edit-question:
    post:
      tags: [plugin]
      summary: Re-open an answered question
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Re-opened question/card
  /upload:
    post:
      tags: [plugin]
      summary: Upload a customer document and return a storage reference
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Upload accepted
  /quote/{id}/pdf:
    get:
      tags: [plugin]
      summary: Mint a short-lived signed quote PDF URL after auth/PIN check
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Signed display URL
  /agent/callback:
    post:
      tags: [plugin]
      summary: Request an agent callback
      security:
        - pluginHmac: []
      responses:
        "200":
          description: Callback request recorded
  /agent/quote-result:
    post:
      tags: [staff]
      summary: Staff-authenticated manual quote result entry
      responses:
        "200":
          description: Manual result accepted
  /admin/lines:
    get:
      tags: [admin]
      summary: List configured insurance lines
      responses:
        "200":
          description: Line list
  /admin/lines/{line}/professions:
    get:
      tags: [admin]
      summary: List professions for an insurance line
      parameters:
        - name: line
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profession list
  /admin/lines/{line}/professions/{profession}:
    put:
      tags: [admin]
      summary: Author or update a profession question set
      parameters:
        - name: line
          in: path
          required: true
          schema:
            type: string
        - name: profession
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Question set updated
  /rater/jobs/claim:
    post:
      tags: [rater]
      summary: Atomically claim one queued job
      security:
        - workerHmac: []
      responses:
        "200":
          description: Job claimed
        "204":
          description: No queued job
  /rater/jobs/{job_id}/heartbeat:
    post:
      tags: [rater]
      summary: Extend a claimed job lease, report progress, and exchange live carrier questions
      description: "Worker->Coordinator. Carries progress/stage/carrier. ADAPTIVE: if a carrier shows an unexpected required field the rater can't answer from the job data, the rater includes pending_question (classified into one of our answer-card types by the Sonnet-vision adaptive engine); the Coordinator surfaces it to the plugin via GET /quote/{id}/status. The RESPONSE returns pending_answer once the user has answered, which the rater enters on the carrier site. Plan 6.8 + Adaptive Rater Intelligence."
      security:
        - workerHmac: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                progress: { type: integer, minimum: 0, maximum: 100 }
                stage: { type: string }
                carrier: { type: string }
                pending_question:
                  $ref: "#/components/schemas/PendingCarrierQuestion"
      responses:
        "200":
          description: Heartbeat accepted; may include a pending_answer for a previously-surfaced carrier question
          content:
            application/json:
              schema:
                type: object
                properties:
                  ack: { type: boolean }
                  pending_answer:
                    type: object
                    description: "Present once the user answered a live carrier question; the rater enters this value on the carrier site."
                    properties:
                      question_id: { type: string }
                      answer: {}
  /rater/jobs/{job_id}/complete:
    post:
      tags: [rater]
      summary: Complete a claimed rater job
      security:
        - workerHmac: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./completion.schema.json"
      responses:
        "200":
          description: Completion accepted idempotently
  /rater/jobs/{job_id}/fail:
    post:
      tags: [rater]
      summary: Fail a claimed rater job
      security:
        - workerHmac: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      responses:
        "200":
          description: Failure accepted
  /rater/artifacts/sign:
    post:
      tags: [rater]
      summary: Mint a short-lived GCS upload URL for a rater artifact
      security:
        - workerHmac: []
      responses:
        "200":
          description: Signed upload URL
  /rater/worker/heartbeat:
    post:
      tags: [rater]
      summary: Report worker process health
      security:
        - workerHmac: []
      responses:
        "200":
          description: Worker heartbeat accepted
  /rater/jobs/{job_id}/question-set-draft:
    post:
      tags: [rater]
      deprecated: true
      summary: "[DEPRECATED] Submit a UW question-set draft via the quote-job path"
      description: "DEPRECATED (RAG-AI-000, plan §7.2). Question-set discovery is now a SEPARATE discovery job (see /rater/discovery-jobs/*), NOT a quote-job fulfillment_mode. quote-job fulfillment_mode stays automated|manual only. This path is retained because Adaptive Rater Intelligence (§24.4) already implemented it; it is unused for the MVP discovery flow and will be removed once callers migrate to /rater/discovery-jobs/{discovery_job_id}/question-set-draft. Always reviewed (human/AI) before going live."
      security:
        - workerHmac: []
      parameters:
        - $ref: "#/components/parameters/JobId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./question-set-draft.schema.json"
      responses:
        "200":
          description: Draft accepted for review
  /rater/discovery-jobs/claim:
    post:
      tags: [rater]
      summary: Claim a question-set discovery/crawler job
      description: "Coordinator -> Rater discovery job, SEPARATE from quote execution (plan §7.2). Atomic claim like quote jobs. Returns a crawler-job.schema.json. Drafts are ALWAYS reviewed before going live; crawler/intake drafts are never coverage authority."
      security:
        - workerHmac: []
      responses:
        "200":
          description: A claimed discovery job
          content:
            application/json:
              schema:
                $ref: "./crawler-job.schema.json"
        "204":
          description: No discovery job available
  /rater/discovery-jobs/{discovery_job_id}/heartbeat:
    post:
      tags: [rater]
      summary: Report discovery-job progress
      security:
        - workerHmac: []
      parameters:
        - name: discovery_job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Heartbeat accepted
  /rater/discovery-jobs/{discovery_job_id}/question-set-draft:
    post:
      tags: [rater]
      summary: Submit a harvested UW question-set draft for review
      description: "The rater crawls the carrier flow and posts harvested questions here. needs_review is always true; the draft is NEVER promoted to a live question set automatically and is never used as coverage authority."
      security:
        - workerHmac: []
      parameters:
        - name: discovery_job_id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "./question-set-draft.schema.json"
      responses:
        "200":
          description: Draft accepted for review
  /rater/discovery-jobs/{discovery_job_id}/complete:
    post:
      tags: [rater]
      summary: Mark a discovery job complete
      security:
        - workerHmac: []
      parameters:
        - name: discovery_job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Discovery job completed
  /rater/discovery-jobs/{discovery_job_id}/fail:
    post:
      tags: [rater]
      summary: Mark a discovery job failed (retryable per attempt caps)
      security:
        - workerHmac: []
      parameters:
        - name: discovery_job_id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Discovery job failure recorded
components:
  securitySchemes:
    pluginHmac:
      type: apiKey
      in: header
      name: X-PolicyGPT-Signature
      description: sha256 HMAC over timestamp.raw_body using PLUGIN_SECRET, with timestamp/environment/nonce replay checks.
    workerHmac:
      type: apiKey
      in: header
      name: X-PolicyGPT-Signature
      description: sha256 HMAC over timestamp.raw_body using WORKER_SECRET, with timestamp/nonce replay checks.
  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    PendingCarrierQuestion:
      type: object
      description: "A carrier asked a question the rater isn't mapped for. The Sonnet-vision adaptive engine classified it into one of our answer-card types so the plugin can render it on the processing screen. Reuses the answer_type enum (plan 3.2)."
      required: [question_id, prompt, answer_type]
      properties:
        question_id: { type: string }
        carrier: { type: string }
        prompt: { type: string }
        answer_type:
          type: string
          enum: [yes_no, single_select, multi_select, currency, number, date, phone, email, address, text]
        options:
          type: array
          items:
            type: object
            properties:
              label: { type: string }
              value: { type: string }
        required: { type: boolean }
        needs_new_component:
          type: boolean
          description: "TRUE if this question's answer_type has NO matching quick-answer card component in the design kit yet. The plugin shows a graceful fallback and the system FLAGS it to the operator (rater console + a notice) so a new component can be requested from Claude Design. The agents must NOT invent a card."
        proposed_component:
          type: string
          description: "Short description of the card component that would be needed, to send to Claude Design."
